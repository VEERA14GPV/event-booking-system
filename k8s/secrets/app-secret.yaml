# ─────────────────────────────────────────────────────────────────────────────
# Application secrets — JWT signing key and Razorpay credentials.
#
# IMPORTANT: Replace every value before deploying.
#
#   # Generate a secure 64-character JWT secret:
#   openssl rand -base64 48 | tr -d '\n' | base64
#
#   # Encode any other value:
#   echo -n 'your-secret' | base64
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: event-booking
  labels:
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: event-booking
type: Opaque
data:
  # A minimum 32-character random string — MUST be replaced.
  # echo -n 'REPLACE_WITH_64_CHAR_RANDOM_SECRET_GENERATED_BY_OPENSSL' | base64
  jwt-secret: UkVQTEFDRV9XSVRIX0dFTkVSQVRFRF9KV1RfU0VDUkVUX01JTklNVU1fMzJfQ0hBUlM=
  # echo -n 'rzp_live_XXXXXXXXXXXXXXXX' | base64
  razorpay-key-id: UkVQTEFDRV9SQVpPUlBBWV9LRVlfSUQ=
  # echo -n 'your-razorpay-key-secret' | base64
  razorpay-key-secret: UkVQTEFDRV9SQVpPUlBBWV9LRVlfU0VDUkVU
