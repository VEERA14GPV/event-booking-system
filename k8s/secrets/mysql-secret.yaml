# ─────────────────────────────────────────────────────────────────────────────
# MySQL credentials — stored as a K8s Secret so the values are NOT in
# plain-text ConfigMaps or Deployment env vars.
#
# IMPORTANT: The values below are base64-encoded PLACEHOLDERS.
# Replace them before deploying:
#
#   echo -n 'your-actual-password' | base64
#
# For production, use a secrets manager (Vault, AWS Secrets Manager,
# Sealed Secrets, or External Secrets Operator) instead of committing
# this file to source control.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: event-booking
  labels:
    app.kubernetes.io/component: mysql
    app.kubernetes.io/part-of: event-booking
type: Opaque
data:
  # echo -n 'event_booking_db' | base64
  mysql-database: ZXZlbnRfYm9va2luZ19kYg==
  # echo -n 'booking_user' | base64
  mysql-user: Ym9va2luZ191c2Vy
  # echo -n 'CHANGE_ME_STRONG_PASSWORD' | base64
  mysql-password: Q0hBTkdFX01FX1NUUk9OR19QQVNTV09SRA==
  # echo -n 'CHANGE_ME_ROOT_PASSWORD' | base64
  mysql-root-password: Q0hBTkdFX01FX1JPT1RfUEFTU1dPUkQ=
