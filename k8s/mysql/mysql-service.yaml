apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: event-booking
  labels:
    app: mysql
    app.kubernetes.io/component: mysql
    app.kubernetes.io/part-of: event-booking
spec:
  # ClusterIP makes MySQL reachable only within the cluster.
  # The backend connects to "mysql:3306" (DNS resolves this Service).
  type: ClusterIP
  clusterIP: None   # Headless — pods get stable DNS: mysql-0.mysql.event-booking.svc.cluster.local
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
      protocol: TCP
  selector:
    app: mysql
