apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: event-booking
  labels:
    app: mysql
    app.kubernetes.io/component: mysql
    app.kubernetes.io/part-of: event-booking
spec:
  serviceName: mysql        # headless Service for stable DNS (mysql-0.mysql)
  replicas: 1               # single-instance; HA requires MySQL Group Replication
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      # Run MySQL as its own user; the official image already handles this.
      terminationGracePeriodSeconds: 60

      containers:
        - name: mysql
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: mysql
              containerPort: 3306

          env:
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-database
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-password
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-root-password

          args:
            # Performance / charset tuning passed as CLI flags
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
            - --default-authentication-plugin=mysql_native_password
            - --max-connections=200
            - --innodb-buffer-pool-size=256M

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "mysqladmin ping -h 127.0.0.1 -u root -p${MYSQL_ROOT_PASSWORD}"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "mysql -h 127.0.0.1 -u ${MYSQL_USER} -p${MYSQL_PASSWORD} -e 'SELECT 1' ${MYSQL_DATABASE}"
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 6

          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql

  # VolumeClaimTemplates creates a PVC per pod automatically.
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
        labels:
          app: mysql
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
        # storageClassName: ""  # Uncomment to use a specific StorageClass
        #                        # e.g. "standard" (minikube), "gp2" (EKS),
        #                        # "pd-standard" (GKE). Omitting uses the default.
