# =========================================================
# PRODUCTION PROFILE OVERRIDES
# Activated by: SPRING_PROFILES_ACTIVE=prod
# These settings override application.properties when the
# prod profile is active (always set in K8s / Docker prod).
# =========================================================

# --- JPA ---
# Never auto-migrate schema in production; use Flyway/Liquibase instead.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# --- LOGGING ---
logging.level.com.booking=INFO
logging.level.org.hibernate.SQL=ERROR
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN

# --- ERROR RESPONSES ---
# Do not leak internal error details to API consumers.
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

# --- SWAGGER ---
# Disable API docs in production (re-enable if you need it behind auth).
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# --- ACTUATOR ---
# Expose only health in production; metrics via Prometheus scrape.
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
