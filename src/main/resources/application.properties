# =========================================================
# APPLICATION
# =========================================================
spring.application.name=event-booking-system

# =========================================================
# SERVER
# =========================================================
server.port=8082

# =========================================================
# MYSQL DATABASE
# =========================================================
spring.datasource.url=jdbc:mysql://localhost:3306/event_booking_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Veera-140905
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================================
# JPA / HIBERNATE
# =========================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# =========================================================
# CONNECTION POOL (HIKARI)
# =========================================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# =========================================================
# JWT
# =========================================================
app.jwt.secret=MySecretKeyForJwtTokenGeneration123456
app.jwt.expiration=86400000

# =========================================================
# REDIS
# =========================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60000

# =========================================================
# REDIS CACHE
# =========================================================
spring.cache.type=redis

# Cache TTL (10 minutes)
spring.cache.redis.time-to-live=600000

# Prevent caching null values
spring.cache.redis.cache-null-values=false

# =========================================================
# WEBSOCKET
# =========================================================
spring.websocket.path=/ws

# =========================================================
# SWAGGER / OPENAPI
# =========================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# =========================================================
# LOGGING
# =========================================================
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=INFO
logging.level.com.booking=DEBUG

# =========================================================
# JACKSON
# =========================================================
spring.jackson.serialization.fail-on-empty-beans=false

# =========================================================
# FILE UPLOAD
# =========================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =========================================================
# SCHEDULER
# =========================================================
spring.task.scheduling.pool.size=5

# =========================================================
# RATE LIMITING
# =========================================================
rate.limit.capacity=10
rate.limit.refill-tokens=10
rate.limit.refill-duration-minutes=1

# =========================================================
# SEAT LOCK TTL
# =========================================================
seat.lock.duration.minutes=5

# =========================================================
# BOOKING EXPIRY
# =========================================================
booking.expiry.minutes=10

# =========================================================
# RAZORPAY
# =========================================================
razorpay.key.id=YOUR_RAZORPAY_KEY
razorpay.key.secret=YOUR_RAZORPAY_SECRET

# =========================================================
# ACTUATOR (OPTIONAL)
# =========================================================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always