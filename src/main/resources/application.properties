# =========================================================
# APPLICATION
# =========================================================

spring.application.name=event-booking-system

# =========================================================
# SERVER
# =========================================================

server.port=8082
server.shutdown=graceful

# =========================================================
# MYSQL DATABASE (DOCKER)
# =========================================================

spring.datasource.url=jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/event_booking_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:booking_user}
spring.datasource.password=${DB_PASSWORD:change_me_strong_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================================
# HIKARI CONNECTION POOL
# =========================================================

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# =========================================================
# JPA / HIBERNATE
# =========================================================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =========================================================
# JWT
# =========================================================

app.jwt.secret=${JWT_SECRET:local-dev-jwt-secret-do-not-use-in-production-12345678901234567890}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# =========================================================
# REDIS
# =========================================================

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:redis}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# =========================================================
# ELASTICSEARCH
# =========================================================

spring.elasticsearch.uris=${SPRING_ELASTICSEARCH_URIS:http://elasticsearch:9200}
spring.elasticsearch.connection-timeout=5s
spring.elasticsearch.socket-timeout=5s

# =========================================================
# RESILIENCE4J - CIRCUIT BREAKER
# =========================================================

resilience4j.circuitbreaker.instances.elasticsearchSearch.register-health-indicator=true
resilience4j.circuitbreaker.instances.elasticsearchSearch.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.elasticsearchSearch.sliding-window-size=10
resilience4j.circuitbreaker.instances.elasticsearchSearch.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.elasticsearchSearch.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.elasticsearchSearch.wait-duration-in-open-state=10s

resilience4j.circuitbreaker.instances.elasticsearchIndex.register-health-indicator=true
resilience4j.circuitbreaker.instances.elasticsearchIndex.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.elasticsearchIndex.sliding-window-size=10
resilience4j.circuitbreaker.instances.elasticsearchIndex.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.elasticsearchIndex.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.elasticsearchIndex.wait-duration-in-open-state=10s

# =========================================================
# RESILIENCE4J - RETRY
# =========================================================

resilience4j.retry.instances.elasticsearchSearch.max-attempts=3
resilience4j.retry.instances.elasticsearchSearch.wait-duration=300ms

resilience4j.retry.instances.elasticsearchIndex.max-attempts=3
resilience4j.retry.instances.elasticsearchIndex.wait-duration=300ms

# =========================================================
# CACHE
# =========================================================

spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# =========================================================
# WEBSOCKET
# =========================================================

spring.websocket.path=/socket

# =========================================================
# SWAGGER
# =========================================================

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# =========================================================
# LOGGING
# =========================================================

logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.level.com.booking=DEBUG
logging.level.org.hibernate.SQL=INFO

# =========================================================
# JACKSON
# =========================================================

spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# =========================================================
# FILE UPLOAD
# =========================================================

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =========================================================
# SCHEDULER
# =========================================================

spring.task.scheduling.pool.size=5

# =========================================================
# SEAT LOCK
# =========================================================

seat.lock.duration.minutes=5

# =========================================================
# BOOKING EXPIRY
# =========================================================

booking.expiry.minutes=10

# =========================================================
# RAZORPAY
# =========================================================

razorpay.key.id=${RAZORPAY_KEY_ID:test_key}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:test_secret}

# =========================================================
# ACTUATOR
# =========================================================

management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers,circuitbreakerevents
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

management.health.elasticsearch.enabled=false
management.endpoint.health.group.liveness.include=db,redis,diskSpace
management.endpoint.health.group.readiness.include=db,redis,diskSpace
# =========================================================
# DEVTOOLS
# =========================================================

spring.devtools.restart.enabled=false

# =========================================================
# ERROR HANDLING
# =========================================================

server.error.include-message=always
server.error.include-binding-errors=always

# =========================================================
# PERFORMANCE
# =========================================================

logging.level.org.springframework.cache=INFO
logging.level.org.springframework.data.redis=INFO
