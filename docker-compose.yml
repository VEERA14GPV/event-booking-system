services:

  mysql:
    image: mysql:8.0
    container_name: event-booking-mysql
    restart: unless-stopped

    environment:
      MYSQL_DATABASE: event_booking_db
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - booking-net

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: event-booking-redis
    restart: unless-stopped

    command: redis-server --appendonly yes

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    networks:
      - booking-net

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.3
    container_name: event-booking-elasticsearch
    restart: unless-stopped

    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"

    ports:
      - "9200:9200"

    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

    networks:
      - booking-net

    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\"'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: event-booking-app
    restart: unless-stopped

    depends_on:
      mysql:
        condition: service_healthy

      redis:
        condition: service_healthy

      elasticsearch:
        condition: service_healthy

    environment:

      # MySQL
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/event_booking_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}

      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

      # Elasticsearch
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200

      # JWT
      JWT_SECRET: ${JWT_SECRET}

      # Razorpay
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}

    ports:
      - "8082:8082"

    networks:
      - booking-net

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 512m
          cpus: "0.5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: event-booking-frontend
    restart: unless-stopped

    depends_on:
      app:
        condition: service_healthy

    ports:
      - "5173:80"

    networks:
      - booking-net

networks:
  booking-net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  elasticsearch_data: