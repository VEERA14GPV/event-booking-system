# ─────────────────────────────────────────────────────────────
# K8s nginx config — serves the React SPA only.
#
# API routing (/auth, /events, /shows, /seats, /bookings,
# /payments, /socket, /actuator) is handled by the NGINX
# Ingress Controller at the cluster level; this container
# never sees those paths.
# ─────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    absolute_redirect off;
    port_in_redirect  off;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Aggressive caching for hashed assets (Vite fingerprints JS/CSS).
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html must never be cached so the browser always fetches
    # the latest entry point (and therefore the latest asset hashes).
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # SPA fallback — unknown paths serve index.html so React Router
    # handles client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # nginx health endpoint used by the K8s readiness probe.
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Deny hidden files (.env, .git, etc.).
    location ~ /\. {
        deny all;
    }
}
